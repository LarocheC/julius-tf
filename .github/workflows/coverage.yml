name: cov>90%
on:
  push:
    branches: [ main, v2, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v6
      with:
        python-version: "3.9"
        enable-cache: true

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Test coverage
      run: |
         test "$(uv run --extra dev make tests | sed -nEe 's/TOTAL.*[[:space:]]([[:digit:]]+)%/\1/p')" -ge 90
